# Theme: keep native widget accents (selected states, focus rings, spinners)
# aligned with the app's teal/purple identity instead of Streamlit's red.
[theme]
base = "dark"
primaryColor = "#00f5d4"
backgroundColor = "#0a0a0f"
secondaryBackgroundColor = "#12121a"
textColor = "#ffffff"

[browser]
gatherUsageStats = false
